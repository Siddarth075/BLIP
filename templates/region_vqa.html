<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Region VQA</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0F1720;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

.navbar{
    background:#161F2B;
}

.wrapper{
    width:95%;
    margin:auto;
}

.card{
    background:#1B2531;
    border:none;
    border-radius:12px;
}

img{
    max-width:100%;
    border-radius:10px;
    border:3px solid #45D9C8;
}

textarea{

    resize:none;

}

.answer{

    background:#16212F;
    border:2px solid #45D9C8;
    border-radius:12px;

    padding:20px;

    margin-top:20px;

    min-height:120px;

    font-size:22px;

    color:#FFFFFF;

    font-weight:600;

    line-height:1.8;

    box-shadow:0 0 15px rgba(69,217,200,0.15);

}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container-fluid px-4">

<span class="navbar-brand">

VisionIQ AI - Region VQA

</span>

<a href="/" class="btn btn-warning">

Home

</a>

</div>

</nav>

<div class="wrapper mt-4">

<div class="row">

<div class="col-lg-6">

<div class="card p-3">

<h4>Cropped Region</h4>

<br>

<img src="{{ url_for('static', filename=image) }}">

</div>

</div>

<div class="col-lg-6">

<div class="card p-4">

<h4>Ask About Selected Region</h4>

<br>

<form
action="/region_ask"
method="POST">

<input
type="hidden"
name="image"
value="{{ image }}">

<input

type="text"

name="question"

class="form-control"

placeholder="Ask anything..."

required>

<br>

<button
class="btn btn-success">

Ask AI

</button>

</form>

{% if answer %}

<div class="answer">

<h4 style="color:#45D9C8;">
🤖 VisionIQ Answer
</h4>

<hr style="border-color:#45D9C8;">

<p
style="
color:white;
font-size:24px;
font-weight:600;
margin:0;
">

{{ answer }}

</p>

</div>

{% endif %}

</div>

</div>

</div>

</div>

</body>

</html>
