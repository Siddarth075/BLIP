<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisionIQ AI - Annotation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0F1720;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

.navbar{
    background:#161F2B;
}

.wrapper{
    width:95%;
    margin:auto;
}

.image-wrapper{

    position:relative;

    display:inline-block;

    border:3px solid #45D9C8;

    border-radius:10px;

    overflow:hidden;

}

#mainImage{

    display:block;

    max-width:100%;

    height:auto;

}

#drawCanvas{

    position:absolute;

    left:0;

    top:0;

    cursor:crosshair;

}

.info{

    background:#1B2531;

    padding:20px;

    border-radius:10px;

}

.coordinate{

    font-size:18px;

    margin:10px 0;

}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container-fluid px-4">

<span class="navbar-brand">

VisionIQ AI - Annotation

</span>

<a href="/" class="btn btn-warning">

Back

</a>

</div>

</nav>

<div class="wrapper mt-4">

<div class="row">

<div class="col-lg-8 text-center">

<div class="image-wrapper">

<img
id="mainImage"
src="{{ image_path }}">

<canvas id="drawCanvas"></canvas>

</div>

</div>

<div class="col-lg-4">

<div class="info">

<h4>Selected Region</h4>

<div class="coordinate">

X :
<span id="xText">0</span>

</div>

<div class="coordinate">

Y :
<span id="yText">0</span>

</div>

<div class="coordinate">

Width :
<span id="wText">0</span>

</div>

<div class="coordinate">

Height :
<span id="hText">0</span>

</div>

<form
action="/crop_region"
method="POST">

<input
type="hidden"
name="x"
id="x">

<input
type="hidden"
name="y"
id="y">

<input
type="hidden"
name="w"
id="w">

<input
type="hidden"
name="h"
id="h">

<button
class="btn btn-success w-100 mt-3">

Crop Region

</button>

</form>

</div>

</div>

</div>

</div>

<script src="{{ url_for('static',filename='js/annotate.js') }}"></script>

</body>

</html>
